<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vendas de Carros Usados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Sistema de Vendas de Carros Usados</h1>
        <table class="table table-striped mt-4">
            <thead>
                <tr>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Ano</th>
                    <th>Preço</th>
                    <th>Ação</th>
                </tr>
            </thead>

                <tr>
                    <td>Ford</td>

                    <td><button car="Ford" brand="Ford">Comprar</button></td>
                </tr>
                <tr>
                    <td>Chevrolet</td>
                    <td>Onix</td>
                    <td>2020</td>
                    <td>R$ 55,000</td>
                    <td><button car="Chevrolet" brand="Chevrolet">Comprar</button></td>
                </tr>
                <tr>
                    <td>Volkswagen</td>
                    <td>Gol</td>

                    <td>R$ 40,000</td>
                    <td><button car="Volkswagen" brand="Volkswagen">Comprar</button></td>
                </tr>
            </tbody> -->
            
            <tbody>
                {% for car in cars %}
                <tr>
                    <td>{{ car.brand }}</td>
                    <td>{{ car.model }}</td>
                    <td>{{ car.year }}</td>
                    <td>R$ {{ car.price }}</td>
                    <td><button car="{{ car.model }}" brand="{{ car.brand }}" class=" btn btn-primary">Comprar</button></td>
                </tr>
                {% endfor %}
            </tbody>
            
        </table>
    </div>
    <script src="{{ url_for('static', filename='car_sales.js') }}"></script>
</body>
</html>
