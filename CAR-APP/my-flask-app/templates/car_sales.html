<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ store_name | default('Loja de Carros Usados') }} - Home</title>
    <style>
        :root{--accent:#0b6efd;--muted:#666}
        body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f7fb;color:#111}
        .header{background:linear-gradient(90deg,var(--accent),#0366d6);color:#fff;padding:36px 16px}
        .container{max-width:1100px;margin:24px auto;padding:0 16px}
        h1{margin:0;font-size:32px;letter-spacing:-0.5px}
        .sub{color:rgba(255,255,255,0.9);margin-top:6px;font-size:14px}
        .card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(20,30,60,0.08)}
        .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
        .search{flex:1;min-width:200px}
        input,select{width:100%;padding:8px 10px;border:1px solid #dbe3f0;border-radius:6px}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th,td{padding:10px 12px;border-bottom:1px solid #eef2f7;text-align:left}
        th{background:#fafcff;color:#0b1a34;font-weight:600;position:sticky;top:0}
        .muted{color:var(--muted);font-size:13px}
        .price{color:#0b6efd;font-weight:700}
        .empty{padding:36px;text-align:center;color:var(--muted)}
        @media (max-width:700px){
            th:nth-child(3),td:nth-child(3),th:nth-child(6),td:nth-child(6){display:none}
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>{{ store_name | default('Loja de Carros Usados') }}</h1>
            <div class="sub">Encontre seu próximo carro usado com segurança e transparência</div>
        </div>
    </header>

    <main class="container" role="main">
        <section class="card" aria-labelledby="catalogo-title">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap">
                <h2 id="catalogo-title" style="margin:0;font-size:18px">Catálogo de Veículos</h2>
                <div class="muted">Total: {{ cars|length if cars is defined else 0 }}</div>
            </div>

            <div class="controls">
                <div class="search">
                    <input type="search" placeholder="Pesquisar por marca, modelo ou ano" aria-label="Pesquisar carros" />
                </div>
                <div style="width:180px">
                    <select aria-label="Ordenar">
                        <option value="recent">Mais recentes</option>
                        <option value="price_asc">Preço: menor → maior</option>
                        <option value="price_desc">Preço: maior → menor</option>
                        <option value="km_asc">Quilometragem: menor → maior</option>
                    </select>
                </div>
            </div>

            <!-- {% if cars %}
